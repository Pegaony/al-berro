<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Nos Fuimos Al Berro</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080C10;--surface:#111820;--surface2:#1A2330;--border:#1E2D3D;
  --mango:#FFB800;--mango2:#FF8C00;--coral:#FF4560;--teal:#00D4AA;
  --text:#F0F4F8;--text2:#8A9BB0;--gold:#FFD700;--radius:14px;--nav-h:68px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0D1F2D,#0A1628);padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10;}
.header-logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--mango),var(--mango2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 14px rgba(255,184,0,0.4);}
.logo-text span{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--mango);letter-spacing:.5px;display:block;}
.logo-text small{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.live-pill{background:var(--coral);color:#fff;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;letter-spacing:1px;animation:pulse-live 2s infinite;}
@keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.7}}
.notif-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;}

/* ── SCREENS ── */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(var(--nav-h)+16px);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .25s ease,transform .25s ease;}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.screen::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);display:flex;align-items:flex-end;z-index:100;}
.nav-inner{width:100%;display:flex;background:rgba(17,24,32,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 8px;cursor:pointer;transition:all .2s;border:none;background:none;color:var(--text2);}
.nav-btn .nav-icon{font-size:22px;transition:transform .2s;}
.nav-btn .nav-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.nav-btn.active{color:var(--mango);}
.nav-btn.active .nav-icon{transform:scale(1.15);}

/* ── CARDS / COMMON ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.card-pad{padding:16px;}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:14px;background:var(--mango);border-radius:2px;display:block;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:14px;line-height:1.6;}

/* ── HOME ── */
.ep-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.ep-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;cursor:pointer;background:#0a1628;}
.ep-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.ep-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D2137,#071420);flex-direction:column;gap:8px;}
.ep-thumb-placeholder span{font-size:13px;color:var(--text2);font-weight:600;}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);}
.play-btn{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--mango),var(--mango2));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 28px rgba(255,184,0,.5);transition:transform .2s;}
.play-btn:hover{transform:scale(1.08);}
.ep-num-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);border:1px solid rgba(255,184,0,.35);color:var(--mango);font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;}
.ep-info{padding:12px 14px;border-top:1px solid var(--border);}
.ep-info strong{font-weight:800;font-size:14px;display:block;margin-bottom:2px;}
.ep-info span{font-size:11px;color:var(--text2);}
.ep-watch-btn{display:block;width:100%;padding:11px;background:linear-gradient(135deg,var(--mango),var(--mango2));color:#000;font-weight:900;font-size:14px;text-align:center;border:none;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;}
.ep-watch-btn:active{opacity:.85;}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.stat-val{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--mango);}
.stat-val.teal{color:var(--teal);}
.stat-sub{font-size:10px;color:var(--text2);margin-top:2px;}

.vote-banner{background:linear-gradient(135deg,var(--mango),var(--mango2));border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;cursor:pointer;box-shadow:0 4px 20px rgba(255,184,0,.3);transition:transform .15s;}
.vote-banner:active{transform:scale(.98);}
.vb-title{font-family:'Black Han Sans',sans-serif;font-size:20px;color:#000;letter-spacing:1px;}
.vb-sub{font-size:12px;color:rgba(0,0,0,.65);font-weight:700;margin-top:2px;}

/* poll */
.poll-option{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;}
.poll-option.voted{border-color:var(--teal);}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(0,212,170,.12);border-radius:10px 0 0 10px;transition:width .6s ease;}
.poll-row{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
.poll-name{font-weight:700;font-size:14px;}
.poll-pct{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--teal);}

/* activity */
.activity-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-avatar{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.activity-text{font-size:13px;line-height:1.5;}
.activity-text strong{color:var(--mango);}
.activity-time{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── SOLTEROS ── */
.top3-row{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:8px;margin-bottom:16px;align-items:flex-end;}
.top3-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 8px 12px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.top3-card.gold{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,215,0,.07),var(--surface));}
.top3-card.silver{border-color:#9CA3B0;}
.top3-card.bronze{border-color:#CD7F32;}
.top3-crown{position:absolute;top:5px;left:50%;transform:translateX(-50%);font-size:15px;}
.top3-avatar{font-size:32px;margin-bottom:5px;display:block;}
.top3-name{font-weight:800;font-size:12px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top3-pct{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--mango);}
.top3-rank{font-size:10px;color:var(--text2);margin-top:2px;}

.participant-list{display:flex;flex-direction:column;gap:10px;}
.participant-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;}
.participant-card.voted-card{border-color:var(--mango);background:linear-gradient(135deg,rgba(255,184,0,.05),var(--surface));}
.p-avatar{width:50px;height:50px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;border:2px solid var(--border);overflow:hidden;}
.p-avatar img{width:100%;height:100%;object-fit:cover;}
.p-info{flex:1;min-width:0;}
.p-name{font-weight:800;font-size:15px;margin-bottom:2px;}
.p-detail{font-size:11px;color:var(--text2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-bar-wrap{background:var(--surface2);border-radius:20px;height:5px;}
.p-bar{height:5px;border-radius:20px;background:linear-gradient(90deg,var(--mango),var(--mango2));transition:width .6s ease;}
.p-vote-area{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.p-pct{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--mango);}
.vote-heart-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--surface2);transition:all .2s;}
.vote-heart-btn.voted{background:linear-gradient(135deg,var(--coral),#c0392b);border-color:var(--coral);box-shadow:0 0 12px rgba(255,69,96,.4);}
.vote-heart-btn:active{transform:scale(.85);}

/* ── PAREJAS ── */
.pareja-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.pareja-card.voted-card{border-color:var(--coral);background:linear-gradient(135deg,rgba(255,69,96,.05),var(--surface));}
.pareja-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.pareja-avatars{display:flex;position:relative;flex-shrink:0;}
.av{width:44px;height:44px;border-radius:11px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);border:2px solid var(--border);overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.av:last-child{margin-left:-10px;border-color:var(--bg);}
.heart-connector{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);font-size:13px;background:var(--bg);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.pareja-names{flex:1;min-width:0;}
.pareja-names strong{font-weight:800;font-size:15px;display:block;margin-bottom:2px;}
.pareja-names span{font-size:11px;color:var(--text2);}
.pareja-vote-btn{padding:8px 14px;border-radius:30px;border:1px solid var(--border);cursor:pointer;font-weight:800;font-size:12px;background:var(--surface2);color:var(--text2);transition:all .2s;flex-shrink:0;}
.pareja-vote-btn.voted{background:linear-gradient(135deg,var(--coral),#c0392b);color:#fff;border-color:var(--coral);}
.compat-bar{background:var(--surface2);border-radius:20px;height:7px;overflow:hidden;margin-bottom:5px;}
.compat-fill{height:7px;border-radius:20px;background:linear-gradient(90deg,var(--coral),var(--mango));transition:width .6s ease;}
.compat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);}

/* ── INTERACCIÓN ── */
.countdown-card{background:linear-gradient(135deg,#0D1F2D,#071828);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;text-align:center;}
.countdown-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;}
.countdown-digits{display:flex;justify-content:center;gap:12px;}
.cd-block{text-align:center;}
.cd-num{font-family:'Black Han Sans',sans-serif;font-size:36px;color:var(--mango);line-height:1;}
.cd-sep{font-family:'Black Han Sans',sans-serif;font-size:30px;color:var(--mango2);padding-top:2px;}
.cd-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-top:4px;}

.reto-card{background:linear-gradient(135deg,rgba(0,212,170,.08),var(--surface));border:1px solid rgba(0,212,170,.25);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.reto-badge{display:inline-block;background:rgba(0,212,170,.15);color:var(--teal);font-size:10px;font-weight:800;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;}
.reto-title{font-weight:800;font-size:16px;margin-bottom:6px;}
.reto-desc{font-size:13px;color:var(--text2);line-height:1.6;}

.comment-input-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.comment-input-row{display:flex;gap:10px;align-items:flex-end;}
.comment-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;resize:none;outline:none;height:44px;transition:border-color .2s,height .2s;}
.comment-input:focus{border-color:var(--mango);height:80px;}
.comment-send{width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--mango),var(--mango2));font-size:18px;display:flex;align-items:center;justify-content:center;transition:transform .15s;flex-shrink:0;}
.comment-send:active{transform:scale(.9);}
.char-count{font-size:10px;color:var(--text2);margin-top:6px;text-align:right;font-weight:600;}
.comment-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;}
.comment-item:last-child{border-bottom:none;}
.c-avatar{width:34px;height:34px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.c-body{flex:1;}
.c-name{font-weight:800;font-size:12px;color:var(--mango);margin-bottom:3px;}
.c-text{font-size:13px;line-height:1.5;}
.c-meta{font-size:10px;color:var(--text2);margin-top:4px;display:flex;gap:12px;}
.c-like{cursor:pointer;transition:color .2s;}
.c-like:hover{color:var(--coral);}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav-h)+16px);left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--mango),var(--mango2));color:#000;font-weight:800;font-size:13px;padding:10px 22px;border-radius:30px;box-shadow:0 4px 20px rgba(255,184,0,.5);opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:linear-gradient(135deg,var(--coral),#c0392b);color:#fff;}

/* ══════════════════════════════════════════════════
   ADMIN PANEL
══════════════════════════════════════════════════ */
#admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;}
#admin-overlay.open{display:flex;}

/* Login */
.admin-login{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:90%;max-width:360px;text-align:center;}
.admin-login .al-icon{font-size:48px;margin-bottom:14px;}
.admin-login h2{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--mango);margin-bottom:6px;}
.admin-login p{font-size:13px;color:var(--text2);margin-bottom:22px;}
.admin-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;outline:none;margin-bottom:12px;transition:border-color .2s;}
.admin-input:focus{border-color:var(--mango);}
.admin-input::placeholder{color:var(--text2);font-weight:400;}
.admin-btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;letter-spacing:.5px;transition:all .2s;}
.admin-btn.primary{background:linear-gradient(135deg,var(--mango),var(--mango2));color:#000;}
.admin-btn.primary:active{transform:scale(.98);}
.admin-btn.danger{background:rgba(255,69,96,.15);color:var(--coral);border:1px solid rgba(255,69,96,.3);margin-top:10px;}
.admin-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);margin-top:8px;}
.admin-err{color:var(--coral);font-size:12px;font-weight:700;margin-bottom:10px;display:none;}

/* Admin Panel */
.admin-panel{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;display:none;}
.admin-panel.open{display:flex;}
.admin-header{background:linear-gradient(135deg,#0D1F2D,#071420);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.admin-header h1{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--mango);}
.admin-header small{font-size:10px;color:var(--text2);display:block;letter-spacing:1px;text-transform:uppercase;}
.admin-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.admin-tabs::-webkit-scrollbar{display:none;}
.admin-tab{padding:12px 16px;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.admin-tab.active{color:var(--mango);border-bottom-color:var(--mango);}
.admin-body{flex:1;overflow-y:auto;padding:16px;}
.admin-body::-webkit-scrollbar{display:none;}
.admin-section{display:none;}
.admin-section.active{display:block;}

/* Admin form elements */
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--mango);}
.form-input::placeholder{color:var(--text2);font-weight:400;}
textarea.form-input{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.save-btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;background:linear-gradient(135deg,var(--mango),var(--mango2));color:#000;transition:all .2s;margin-top:6px;}
.save-btn:active{transform:scale(.98);}
.delete-btn{background:rgba(255,69,96,.15);color:var(--coral);border:1px solid rgba(255,69,96,.3);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;}
.delete-btn:active{background:rgba(255,69,96,.3);}

/* admin lists */
.admin-list-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.ali-info{flex:1;min-width:0;}
.ali-name{font-weight:800;font-size:14px;margin-bottom:2px;}
.ali-sub{font-size:11px;color:var(--text2
